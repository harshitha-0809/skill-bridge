databases:
  - name: skillbridge-db
    plan: free
    databaseName: skillbridge
    user: skillbridge

services:
  - type: web
    name: skillbridge-api
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: skillbridge-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        sync: false   # You fill this in after Vercel deploys
      - key: PYTHON_VERSION
        value: 3.11.0
